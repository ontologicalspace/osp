name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # INV-T9 #70 CI fix: toolchain pin'i tek truth source rust-toolchain.toml'dur.
      # dtolnay/rust-toolchain @stable ref'inden resolve eder, dosyayı parse ETMEZ
      # (action rustup'a literal toolchain string'i verir). Bu yüzden dosyayı
      # biz okuyup action input'una explicit veriyoruz — floating stable drift'ini
      # kapatır. Trybuild .stderr snapshot'ları compiler diagnostics'e duyarlıdır.
      - name: Read pinned Rust toolchain
        id: rust-toolchain
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          with open("rust-toolchain.toml", "rb") as f:
              tc = tomllib.load(f)["toolchain"]
          print(f"channel={tc['channel']}")
          print(f"components={','.join(tc.get('components', []))}")
          PY

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1, pinned SHA (supply-chain)
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}
          components: ${{ steps.rust-toolchain.outputs.components }}

      - name: Record active Rust toolchain
        run: |
          rustup show active-toolchain
          rustc --version --verbose
          cargo --version

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          # Cache identity toolchain'i de kapsar — bump sonrası eski compiler
          # artifact'leri restore edilmez.
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}

      - name: Check formatting (warnings only)
        run: cargo fmt --all -- --check || true

      # osp-desktop is a Tauri (v2) app: building its binary pulls in
      # webkit2gtk / gtk-sys / glib-sys, which require system packages
      # (libglib2.0-dev, libgtk-3-dev, libwebkit2gtk-4.1-dev, ...). Those are
      # not available on a plain ubuntu runner and are unnecessary for a
      # headless PR gate — the desktop binary cannot run here anyway. It is
      # built locally / in a release workflow. CI covers the 4 library crates:
      # osp-core, osp-analyzer, osp-spike, osp-llm-runtime.
      #
      # --locked: Cargo.lock'u source of truth kabul eder, çözüm değişikliğine
      # izin vermez. trybuild .stderr snapshot'ları (compiler + dependency graph +
      # compiler flags) üçlüsüne duyarlıdır; deterministic CI için zorunlu.
      - name: Build
        run: cargo build --locked --workspace --verbose --exclude osp-desktop

      - name: Run tests
        run: cargo test --locked --workspace --verbose --exclude osp-desktop

      - name: Build examples
        run: cargo build --locked --workspace --examples --exclude osp-desktop
